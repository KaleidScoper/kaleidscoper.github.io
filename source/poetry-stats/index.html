<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>诗词统计 - 栖云散录</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #1c1f26;
    --card: #232733;
    --border: rgba(255,255,255,0.08);
    --text: #c8ccd4;
    --text-dim: #7a8090;
    --accent: #5aa8d8;
    --accent-dim: rgba(90,168,216,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    text-align: center;
    padding: 40px 0 48px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 600;
    color: #e8ecf2;
    letter-spacing: 0.04em;
  }

  header p {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-dim);
  }

  .random-sentence {
    margin: 24px 0 0;
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 400;
    color: #c8ccd4;
    text-align: center;
    line-height: 1.8;
    letter-spacing: 0.04em;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 48px;
    transition: opacity 0.3s ease;
  }

  .random-sentence.loading {
    opacity: 0.4;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 48px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
  }

  .card h2 {
    font-size: 17px;
    font-weight: 600;
    color: #e0e4ec;
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  .chart-wrap.doughnut {
    max-width: 380px;
    margin: 0 auto;
  }

  .chart-wrap.bar {
    max-height: 420px;
    overflow-y: auto;
  }

  .chart-wrap.wordcloud {
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #wordcloud {
    display: block;
    width: 100%;
  }

  /* Poet bar scrollbar */
  .chart-wrap.bar::-webkit-scrollbar { width: 4px; }
  .chart-wrap.bar::-webkit-scrollbar-track { background: transparent; }
  .chart-wrap.bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  footer {
    text-align: center;
    padding: 32px 0;
    font-size: 12px;
    color: var(--text-dim);
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  @media (max-width: 768px) {
    .charts-row {
      grid-template-columns: 1fr;
    }
    .container {
      padding: 24px 16px 48px;
    }
    header h1 {
      font-size: 22px;
    }
    .stats-bar {
      gap: 24px;
    }
    .stat-num {
      font-size: 28px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>随机句子 · 诗词统计</h1>
    <p>数据来源：random-sentences.txt 已选中的活跃句子</p>
    <div id="random-sentence" class="random-sentence loading"></div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <div class="charts-row">
    <div class="card">
      <h2>朝代分布</h2>
      <div class="chart-wrap doughnut">
        <canvas id="dynastyChart"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>诗人句数</h2>
      <div class="chart-wrap bar">
        <canvas id="poetChart"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>字频词云</h2>
    <div class="chart-wrap wordcloud">
      <canvas id="wordcloud"></canvas>
    </div>
  </div>

  <footer>
    <a href="/">栖云散录</a> · 诗词句频统计 · 静态数据
  </footer>
</div>

<script>
// ── Random sentence ──
(function() {
  const el = document.getElementById('random-sentence');
  if (!el) return;

  const DEFAULT = '千秋岁月毫端聚 一纸烟霞腕底生';
  let sentences = [];
  const QUEUE = 5;
  let recent = [];

  async function load() {
    try {
      const resp = await fetch('/data/random-sentences.txt');
      if (!resp.ok) throw new Error('fetch failed');
      const text = await resp.text();
      sentences = text.split('\n')
        .map(l => l.trim())
        .filter(l => l && !l.startsWith('#'));
      if (!sentences.length) throw new Error('empty');
    } catch {
      sentences = [DEFAULT];
    }
  }

  function pick() {
    if (!sentences.length) return DEFAULT;
    const pool = sentences.filter(s => !recent.includes(s));
    if (!pool.length) { recent = []; }
    const chosen = (pool.length ? pool : sentences)[Math.floor(Math.random() * (pool.length || sentences.length))];
    recent.push(chosen);
    if (recent.length > QUEUE) recent.shift();
    return chosen;
  }

  function show() {
    el.innerHTML = pick().replace(/  +/g, '<br>');
    el.classList.remove('loading');
  }

  async function init() {
    await load();
    show();
  }

  init();

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) show();
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script>
<script>
(async function() {
  const resp = await fetch('data.json');
  const data = await resp.json();

  // Stats bar
  document.getElementById('statsBar').innerHTML = [
    { num: data.totalLines, label: '活跃句子' },
    { num: data.dynasties.filter(d => !['自拟','互联网','其他'].includes(d.dynasty)).length, label: '历史朝代' },
    { num: data.poets.filter(p => !['互联网','自拟'].includes(p.poet)).length, label: '诗人词人' },
  ].map(s => `<div class="stat-item"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');

  // ── Dynasty doughnut chart ──
  const dynastyColors = [
    '#5aa8d8','#6fb8e4','#84c8f0','#4a90b8','#3a7a9e',
    '#e8735a','#f08c78','#f5a596','#d06250','#c05240',
    '#7eb896','#9cc8b0','#5a9a72'
  ];

  new Chart(document.getElementById('dynastyChart'), {
    type: 'doughnut',
    data: {
      labels: data.dynasties.map(d => d.dynasty),
      datasets: [{
        data: data.dynasties.map(d => d.count),
        backgroundColor: dynastyColors,
        borderColor: '#232733',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#c8ccd4',
            padding: 12,
            font: { size: 11 },
            generateLabels: function(chart) {
              const ds = chart.data.datasets[0];
              return chart.data.labels.map((label, i) => ({
                text: label + ' ' + ds.data[i],
                fillStyle: ds.backgroundColor[i],
                strokeStyle: ds.backgroundColor[i],
                lineWidth: 0,
                hidden: false,
                index: i,
                fontColor: '#c8ccd4',
              }));
            }
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.label}: ${ctx.raw} 句 (${data.dynasties[ctx.dataIndex].percentage}%)`
          }
        }
      },
      cutout: '55%',
    }
  });

  // ── Poet horizontal bar chart (top 25) ──
  const topPoets = data.poets.slice(0, 25);

  new Chart(document.getElementById('poetChart'), {
    type: 'bar',
    data: {
      labels: topPoets.map(p => p.poet),
      datasets: [{
        data: topPoets.map(p => p.count),
        backgroundColor: topPoets.map((_, i) => {
          const alpha = 1 - (i / topPoets.length) * 0.55;
          return `rgba(90,168,216,${alpha.toFixed(2)})`;
        }),
        borderColor: 'transparent',
        borderRadius: 3,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.raw} 句`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#7a8090', font: { size: 11 }, stepSize: 1 },
        },
        y: {
          grid: { display: false },
          ticks: { color: '#c8ccd4', font: { size: 12 }, autoSkip: false },
        }
      },
    }
  });

  // Set bar chart height dynamically
  document.getElementById('poetChart').parentElement.style.height = (topPoets.length * 32 + 20) + 'px';

  // ── Word cloud ──
  drawWordCloud(data.charFrequencies);
})();

function drawWordCloud(words) {
  const canvas = document.getElementById('wordcloud');
  const ctx = canvas.getContext('2d');

  const container = canvas.parentElement;
  const W = container.clientWidth;
  const H = 440;
  const dpr = window.devicePixelRatio || 1;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  // Normalize weights to font sizes
  const maxCount = words[0].count;
  const minCount = words[words.length - 1].count;

  const sized = words.map(w => ({
    text: w.word,
    size: Math.round(14 + (w.count - minCount) / (maxCount - minCount) * 40),
    weight: w.count,
  }));

  // Colors
  const colors = [
    '#5aa8d8','#7eb896','#e8735a','#c8a0e0','#f0c060',
    '#84c8f0','#9cc8b0','#f08c78','#d8b8f0','#f4d480',
    '#a0d0f0','#b8d8c8','#f5a596','#e0c8f8','#f8e0a0',
  ];

  // Spiral placement
  const placed = [];
  const cx = W / 2;
  const cy = H / 2;

  for (let i = 0; i < sized.length; i++) {
    const item = sized[i];
    ctx.font = `${item.size}px "Noto Sans SC","Source Han Sans SC","PingFang SC","Microsoft YaHei",sans-serif`;
    const metrics = ctx.measureText(item.text);
    const tw = metrics.width;
    const th = item.size;

    let x = cx, y = cy;
    let angle = 0;
    let radius = 0;
    let placed_ok = false;

    // Spiral outward
    const maxIter = 2000;
    for (let j = 0; j < maxIter; j++) {
      angle = j * 0.35;
      radius = Math.sqrt(j) * 2.2;
      x = cx + radius * Math.cos(angle) - tw / 2;
      y = cy + radius * Math.sin(angle) + th / 3;

      // Bounds check
      if (x < 4 || y < 4 || x + tw > W - 4 || y + th > H - 4) {
        continue;
      }

      // Collision check
      let collides = false;
      for (const p of placed) {
        if (x < p.x + p.w + 2 && x + tw + 2 > p.x &&
            y - th < p.y + 2 && y + 2 > p.y - p.h) {
          collides = true;
          break;
        }
      }
      if (!collides) {
        placed_ok = true;
        break;
      }
    }

    if (!placed_ok) continue;

    placed.push({ x, y, w: tw, h: th });

    ctx.fillStyle = colors[i % colors.length];
    ctx.globalAlpha = 0.88;
    ctx.fillText(item.text, x, y);
  }
}
</script>

</body>
</html>
