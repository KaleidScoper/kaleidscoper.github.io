<style>
  /* ═══════════════════════════════════════════
     CSS Custom Properties
     Follows Ayeria naming convention
     ═══════════════════════════════════════════ */
  :root {
    --ps-bg: #1c1f26;
    --ps-card-bg: rgba(35, 39, 51, 0.55);
    --ps-card-border: rgba(255, 255, 255, 0.07);
    --ps-card-shadow: 0 4px 28px rgba(0, 0, 0, 0.2);
    --ps-text: #c8ccd4;
    --ps-text-dim: #7a8090;
    --ps-text-bright: #e8ecf2;
    --ps-accent: #5aa8d8;
    --ps-accent-dim: rgba(90, 168, 216, 0.1);
    --ps-divider: rgba(255, 255, 255, 0.06);

    /* Sidebar */
    --sb-width: 11rem;
    --sb-bg: rgba(28, 31, 38, 0.94);
    --sb-nav-color: #bbb;
    --sb-nav-hover-bg: rgba(255, 255, 255, 0.04);
    --sb-transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ps-bg);
    color: var(--ps-text);
    font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══════════════════════════════════════════
     Sidebar Toggle Button
     Mirrors .navbar-toggle in Ayeria theme
     ═══════════════════════════════════════════ */
  .sidebar-toggle {
    position: fixed;
    z-index: 100;
    top: 1.2rem;
    left: 1.2rem;
    height: 3.6rem;
    width: 3.6rem;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.25s ease, transform 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .sidebar-toggle:hover { opacity: 0.9; }
  .sidebar-toggle:active { transform: scale(0.94); }

  .sidebar-toggle i {
    font-size: 1.6rem;
    line-height: 1;
  }

  /* ═══════════════════════════════════════════
     Sidebar
     ═══════════════════════════════════════════ */
  .sidebar {
    position: fixed;
    z-index: 90;
    left: calc(-1 * var(--sb-width));
    top: 0;
    bottom: 0;
    width: var(--sb-width);
    background: var(--sb-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: left var(--sb-transition);
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .sidebar::-webkit-scrollbar { width: 0; height: 0; }

  .sidebar.open {
    left: 0;
  }

  /* Logo */
  .sidebar-logo {
    margin-top: 5rem;
    margin-bottom: 2.4rem;
    text-align: center;
  }

  .sidebar-logo img {
    width: 42px;
    height: 42px;
    display: block;
    opacity: 0.85;
    transition: opacity 0.2s ease;
  }

  .sidebar-logo a:hover img { opacity: 1; }

  /* Navigation */
  .sidebar-nav {
    flex: 1;
    width: 100%;
    text-align: center;
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .sidebar-nav::-webkit-scrollbar { width: 0; height: 0; }

  .sidebar-nav-link {
    display: block;
    padding: 0.85rem 0.6rem;
    color: var(--sb-nav-color);
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: opacity 0.2s ease, background-color 0.2s ease;
    cursor: pointer;
  }

  .sidebar-nav-link:hover {
    opacity: 0.8;
    background: var(--sb-nav-hover-bg);
  }

  .sidebar-nav-link.active {

    font-weight: 500;
  }

     Sidebar Overlay (mobile)
     ═══════════════════════════════════════════ */
  .sidebar-overlay {

    inset: 0;

    inset: 0;
    z-index: 0;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('images/poetry-hero-bg.webp');
    background-size: cover;
    background-position: center 40%;
    filter: brightness(0.3) saturate(0.5);
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(

      rgba(28, 31, 38, 0.35) 0%,
      rgba(28, 31, 38, 0.7) 60%,

  .hero-inner {

    letter-spacing: 0.1em;

    font-size: clamp(22px, 3.8vw, 34px);

    line-height: 1.9;

    opacity: 0.6;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s ease;
  }
  .hero-note:hover { opacity: 0.85; }

  /* ═══════════════════════════════════════════
     Main Container
     ═══════════════════════════════════════════ */

    max-width: 1100px;
    margin: 0 auto;
    padding: 0 28px 80px;
  }

  /* ═══════════════════════════════════════════
     Stats Overview Bar
     ═══════════════════════════════════════════ */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 72px;
    margin-top: -28px;
    margin-bottom: 60px;
    position: relative;
    z-index: 2;
  }

  .stat-item {
    text-align: center;
    position: relative;
  }

  .stat-item + .stat-item::before {
    content: '';
    position: absolute;
    left: -36px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 40px;
    background: var(--ps-divider);
  }

  .stat-num {
    font-family: "Noto Serif SC", "Source Han Serif SC", serif;
    font-size: 44px;
    font-weight: 600;
    color: var(--ps-text-bright);
    line-height: 1.1;
    letter-spacing: 0.02em;
  }

  .stat-label {
    font-size: 13px;
    color: var(--ps-text-dim);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  /* ═══════════════════════════════════════════
     Chart Cards
     Follows Ayeria Functional Layer spec:
     backdrop-filter + thin border + 12px radius
     ═══════════════════════════════════════════ */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--ps-card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--ps-card-border);
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: var(--ps-card-shadow);
  }

  .card h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--ps-text-bright);
    margin-bottom: 24px;
    letter-spacing: 0.04em;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  .chart-wrap.doughnut {
    max-width: 340px;
    margin: 0 auto;
  }

  .chart-wrap.bar { overflow-y: auto; }

  .chart-wrap.bar::-webkit-scrollbar { width: 4px; }
  .chart-wrap.bar::-webkit-scrollbar-track { background: transparent; }
  .chart-wrap.bar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.06); border-radius: 2px; }

  /* ═══════════════════════════════════════════
     Footer
     ═══════════════════════════════════════════ */
  footer {
    text-align: center;
    padding: 44px 0 20px;
    font-size: 12px;
    color: var(--ps-text-dim);
  }

  footer a {
    color: var(--ps-accent);
    text-decoration: none;
    transition: opacity 0.2s ease;
  }

  footer a:hover { opacity: 0.75; }

  footer .footer-sep {
    display: inline-block;
    margin: 0 8px;
    opacity: 0.35;
  }

  /* ═══════════════════════════════════════════
     Scroll Reveal Animations
     ═══════════════════════════════════════════ */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    transition:
      opacity 0.65s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-stagger-1 { transition-delay: 0.08s; }
  .reveal-stagger-2 { transition-delay: 0.16s; }

  /* ═══════════════════════════════════════════
     Reduced Motion
     ═══════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
    .random-sentence { transition: none; }
    .sidebar, .sidebar-toggle, .sidebar-overlay { transition: none; }
    html { scroll-behavior: auto; }
  }

  /* ═══════════════════════════════════════════
     Desktop: sidebar open pushes toggle button right
     ═══════════════════════════════════════════ */
  @media (min-width: 769px) {
    .sidebar-toggle {
      transition: left var(--sb-transition), opacity 0.25s ease, transform 0.25s ease;
    }
    body.sidebar-open .sidebar-toggle {
      left: calc(var(--sb-width) + 1.2rem);
    }
  }

  /* ═══════════════════════════════════════════
     Responsive - Tablet
     ═══════════════════════════════════════════ */

    .hero {
      min-height: 48vh;
      padding: 72px 20px 60px;
    }

    .random-sentence { font-size: 20px; }
    .hero-title { margin-bottom: 20px; }

    .stats-bar {
      gap: 44px;
      margin-top: -22px;
      margin-bottom: 44px;
    }

    .stat-item + .stat-item::before {

      height: 32px;
    }

    .stat-num { font-size: 34px; }

      grid-template-columns: 1fr;

    }

    .card { padding: 26px 22px; }
    .container { padding: 0 20px 60px; }

      left: -75vw;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-toggle {
      top: 1rem;
      left: 1rem;
    }

    body.sidebar-open .sidebar-toggle {
      left: calc(75vw - 3.6rem - 0.6rem);
    }
  }

  /* ═══════════════════════════════════════════
     Responsive - Mobile
     ═══════════════════════════════════════════ */
  @media (max-width: 480px) {
    .hero {
      min-height: 42vh;

    }

    .sidebar {
      width: 80vw;
      left: -80vw;
    }

<!-- ═══════════════════════════════
     Sidebar Toggle Script
     ═══════════════════════════════ -->
<script>
(function() {
  var sidebar = document.querySelector('.sidebar');
  var toggle = document.querySelector('.sidebar-toggle');
  var overlay = document.querySelector('.sidebar-overlay');
  var navLinks = document.querySelectorAll('.sidebar-nav-link');
  var body = document.body;

  if (!sidebar || !toggle) return;

  function open() {
    sidebar.classList.add('open');
    body.classList.add('sidebar-open');
    if (window.innerWidth <= 768) {
      overlay.classList.add('visible');
    }
  }

  function close() {
    sidebar.classList.remove('open');
    body.classList.remove('sidebar-open');
    overlay.classList.remove('visible');
  }

  function isOpen() {
    return sidebar.classList.contains('open');
  }

  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isOpen()) { close(); } else { open(); }
  });

  overlay.addEventListener('click', close);

  /* Light dismiss: click outside sidebar closes it */
  document.addEventListener('click', function(e) {
    if (!isOpen()) return;
    if (!e.target.closest('.sidebar') && !e.target.closest('.sidebar-toggle')) {
      close();
    }
  });

  /* Close on Escape */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isOpen()) {
      close();
    }
  });

  /* Close sidebar after nav link click (mobile) */
  navLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 768) {
        close();
      }
    });
  });

  /* Adjust overlay visibility on resize */
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
      overlay.classList.remove('visible');
    } else if (isOpen()) {
      overlay.classList.add('visible');
    }
  });
})();
</script>

<!-- ═══════════════════════════════
     Random Sentence Script
     Fisher-Yates shuffle + localStorage persistence
     Shares deck key with blog pages (same localStorage)
     ═══════════════════════════════ -->
<script>
(function() {
  var STORAGE_KEY = 'ayeria-random-deck';
  var el = document.getElementById('random-sentence');
  if (!el) return;

  var DEFAULT = '千秋岁月毫端聚 一纸烟霞腕底生';
  var sentences = [DEFAULT];
  var deck = null; // { fingerprint: number, indices: number[], pointer: number }

  async function load() {
    try {
      var resp = await fetch('/data/random-sentences.txt');
      if (!resp.ok) throw new Error('fetch failed');
      var text = await resp.text();
      var lines = text.split('\n').filter(function(l) {
        var t = l.trim();
        return t && !t.startsWith('#');
      });
      if (lines.length) sentences = lines;
    } catch (e) {}
  }

  function loadDeck() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var d = JSON.parse(raw);
      if (d && d.fingerprint === sentences.length && Array.isArray(d.indices)) return d;
    } catch (e) {}
    return null;
  }

  function saveDeck() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(deck)); } catch (e) {}
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
  }

  function createDeck(prevLastIndex) {
    var indices = [];
    for (var i = 0; i < sentences.length; i++) indices.push(i);
    shuffle(indices);
    if (prevLastIndex !== undefined && indices[0] === prevLastIndex && indices.length > 1) {
      var swap = 1 + Math.floor(Math.random() * (indices.length - 1));
      var tmp = indices[0]; indices[0] = indices[swap]; indices[swap] = tmp;
    }
    return { fingerprint: sentences.length, indices: indices, pointer: 0 };
  }

  function pick() {
    if (!deck) deck = loadDeck();
    if (!deck) deck = createDeck();

    var idx = deck.indices[deck.pointer];
    var sentence = sentences[idx];
    deck.pointer++;

    if (deck.pointer >= deck.indices.length) {
      deck = createDeck(deck.indices[deck.indices.length - 1]);
    }
    saveDeck();
    return sentence;
  }

  function formatSentence(s) {
    var t = s.trimEnd();
    t = t.replace(/ {2,}/g, '<br>');
    t = t.replace(/ /g, '&nbsp;&nbsp;');
    return t;
  }

  function show() {
    el.innerHTML = formatSentence(pick());
    el.classList.remove('loading');
  }

  async function init() {
    await load();
    show();
  }

  init();

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) show();
  });

		var note = document.querySelector('.hero-note');
		if (note) {
			note.addEventListener('click', function() { show(); });
		}
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script>
<script>
(async function() {
  var resp = await fetch('data.json');
  var data = await resp.json();

  /* Stats bar */
  document.getElementById('statsBar').innerHTML = [
    { num: data.totalLines, label: '活跃句子' },
    { num: data.dynasties.filter(function(d) { return ['自拟','互联网','其他'].indexOf(d.dynasty) === -1; }).length, label: '历史朝代' },
    { num: data.poets.filter(function(p) { return ['互联网','自拟'].indexOf(p.poet) === -1; }).length, label: '诗人词人' },
  ].map(function(s) {
    return '<div class="stat-item">' +
      '<div class="stat-num">' + s.num + '</div>' +
      '<div class="stat-label">' + s.label + '</div>' +
    '</div>';
  }).join('');

  /* Color palette */
  var dynastyColors = [
    '#5aa8d8', '#72bce4', '#8bcaf0', '#4e98c0', '#3d80a8', '#2f6a8e',
    '#c49a6c', '#d4ae80', '#b88650', '#a07048',
    '#7eb898', '#64a382', '#8cbc9e', '#4a8c6e', '#9ec4a8',
  ];

  /* Dynasty doughnut chart */
  new Chart(document.getElementById('dynastyChart'), {
    type: 'doughnut',
    data: {
      labels: data.dynasties.map(function(d) { return d.dynasty; }),
      datasets: [{
        data: data.dynasties.map(function(d) { return d.count; }),
        backgroundColor: dynastyColors,
        borderColor: '#1c1f26',
        borderWidth: 2.5,
        hoverBorderColor: '#1c1f26',
        hoverBorderWidth: 3,
      }]
    },
    options: {
      responsive: true,
      cutout: '58%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#c8ccd4',
            padding: 14,
            font: { size: 11, family: '"Noto Sans SC", sans-serif' },
            usePointStyle: true,
            pointStyleWidth: 8,
            generateLabels: function(chart) {
              var ds = chart.data.datasets[0];
              return chart.data.labels.map(function(label, i) {
                return {
                  text: label + '  ' + ds.data[i],
                  fillStyle: ds.backgroundColor[i],
                  strokeStyle: ds.backgroundColor[i],
                  lineWidth: 0,
                  hidden: false,
                  index: i,
                  fontColor: '#c8ccd4',
                  pointStyle: 'circle',
                  pointStyleWidth: 8,
                };
              });
            }
          }
        },
        tooltip: {
          backgroundColor: 'rgba(28, 31, 38, 0.94)',
          titleColor: '#e8ecf2',
          bodyColor: '#c8ccd4',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) {
              var d = data.dynasties[ctx.dataIndex];
              return ctx.label + ': ' + ctx.raw + ' 句 (' + d.percentage + '%)';
            }
          }
        }
      },
    }
  });

  /* Poet horizontal bar chart (top 25) */
  var topPoets = data.poets.slice(0, 25);

  new Chart(document.getElementById('poetChart'), {
    type: 'bar',
    data: {
      labels: topPoets.map(function(p) { return p.poet; }),
      datasets: [{
        data: topPoets.map(function(p) { return p.count; }),
        backgroundColor: topPoets.map(function(_, i) {
          var alpha = 0.92 - (i / topPoets.length) * 0.5;
          return 'rgba(90,168,216,' + alpha.toFixed(2) + ')';
        }),
        borderColor: 'transparent',
        borderRadius: 3,
        borderSkipped: false,
        hoverBackgroundColor: 'rgba(90,168,216,0.95)',
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(28, 31, 38, 0.94)',
          titleColor: '#e8ecf2',
          bodyColor: '#c8ccd4',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) { return ctx.raw + ' 句'; }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#7a8090',
            font: { size: 11, family: '"Noto Sans SC", sans-serif' },
            stepSize: 1,
            padding: 6,
          },
        },
        y: {
          grid: { display: false },
          ticks: {
            color: '#c8ccd4',
            font: { size: 12, family: '"Noto Sans SC", sans-serif' },
            autoSkip: false,
            padding: 4,
          },
        }
      },
    }
  });

  /* Set bar chart wrapper height dynamically */
  document.getElementById('poetChart').parentElement.style.height =
    (topPoets.length * 32 + 16) + 'px';

})();
</script>

<!-- ═══════════════════════════════
     Scroll Reveal Observer
     ═══════════════════════════════ -->
<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    threshold: 0.15,
    rootMargin: '0px 0px -30px 0px',
  });

  document.querySelectorAll('.reveal').forEach(function(el) {
    observer.observe(el);
  });
})();
</script>
