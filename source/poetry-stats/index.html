<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>诗词统计 - 栖云散录</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ═══════════════════════════════════════════
     CSS Custom Properties
     Follows Ayeria naming convention: --ps-*
     ═══════════════════════════════════════════ */
  :root {
    --ps-bg: #1c1f26;
    --ps-card-bg: rgba(35, 39, 51, 0.55);
    --ps-card-border: rgba(255, 255, 255, 0.07);
    --ps-card-shadow: 0 4px 28px rgba(0, 0, 0, 0.2);
    --ps-text: #c8ccd4;
    --ps-text-dim: #7a8090;
    --ps-text-bright: #e8ecf2;
    --ps-accent: #5aa8d8;
    --ps-accent-dim: rgba(90, 168, 216, 0.1);
    --ps-accent-glow: rgba(90, 168, 216, 0.06);
    --ps-divider: rgba(255, 255, 255, 0.06);
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ps-bg);
    color: var(--ps-text);
    font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══════════════════════════════════════════
     Hero Section
     ═══════════════════════════════════════════ */
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 58vh;
    padding: 96px 24px 80px;
    overflow: hidden;
    isolation: isolate;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('images/poetry-hero-bg.webp');
    background-size: cover;
    background-position: center 40%;
    filter: brightness(0.3) saturate(0.5);
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(28, 31, 38, 0.35) 0%,
      rgba(28, 31, 38, 0.7) 60%,
      var(--ps-bg) 100%
    );
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 680px;
  }

  .hero-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ps-accent);
    letter-spacing: 0.1em;
    margin-bottom: 28px;
    opacity: 0.85;
  }

  .random-sentence {
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
    font-size: clamp(22px, 3.8vw, 34px);
    font-weight: 400;
    color: var(--ps-text-bright);
    line-height: 1.9;
    letter-spacing: 0.06em;
    min-height: 64px;
    transition: opacity 0.5s ease;
  }

  .random-sentence.loading {
    opacity: 0.25;
  }

  .hero-note {
    margin-top: 24px;
    font-size: 13px;
    color: var(--ps-text-dim);
    opacity: 0.6;
  }

  /* ═══════════════════════════════════════════
     Main Container
     ═══════════════════════════════════════════ */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 28px 80px;
  }

  /* ═══════════════════════════════════════════
     Stats Overview Bar
     ═══════════════════════════════════════════ */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 72px;
    margin-top: -28px;
    margin-bottom: 60px;
    position: relative;
    z-index: 2;
  }

  .stat-item {
    text-align: center;
    position: relative;
  }

  .stat-item + .stat-item::before {
    content: '';
    position: absolute;
    left: -36px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 40px;
    background: var(--ps-divider);
  }

  .stat-num {
    font-family: "Noto Serif SC", "Source Han Serif SC", serif;
    font-size: 44px;
    font-weight: 600;
    color: var(--ps-text-bright);
    line-height: 1.1;
    letter-spacing: 0.02em;
  }

  .stat-label {
    font-size: 13px;
    color: var(--ps-text-dim);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  /* ═══════════════════════════════════════════
     Chart Cards
     Follows Ayeria Functional Layer spec:
     backdrop-filter + thin border + 12px radius
     ═══════════════════════════════════════════ */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--ps-card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--ps-card-border);
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: var(--ps-card-shadow);
  }

  .card h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--ps-text-bright);
    margin-bottom: 24px;
    letter-spacing: 0.04em;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  .chart-wrap.doughnut {
    max-width: 340px;
    margin: 0 auto;
  }

  .chart-wrap.bar {
    overflow-y: auto;
  }

  .chart-wrap.bar::-webkit-scrollbar { width: 4px; }
  .chart-wrap.bar::-webkit-scrollbar-track { background: transparent; }
  .chart-wrap.bar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.06); border-radius: 2px; }

  /* ═══════════════════════════════════════════
     Footer
     ═══════════════════════════════════════════ */
  footer {
    text-align: center;
    padding: 44px 0 20px;
    font-size: 12px;
    color: var(--ps-text-dim);
  }

  footer a {
    color: var(--ps-accent);
    text-decoration: none;
    transition: opacity 0.2s ease;
  }

  footer a:hover { opacity: 0.75; }

  footer .footer-sep {
    display: inline-block;
    margin: 0 8px;
    opacity: 0.35;
  }

  /* ═══════════════════════════════════════════
     Scroll Reveal Animations
     Subtle opacity + translateY, gated by
     IntersectionObserver in JS.
     ═══════════════════════════════════════════ */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    transition:
      opacity 0.65s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Stagger delays for chart cards */
  .reveal-stagger-1 { transition-delay: 0.08s; }
  .reveal-stagger-2 { transition-delay: 0.16s; }

  /* ═══════════════════════════════════════════
     Reduced Motion
     ═══════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
    .random-sentence { transition: none; }
    html { scroll-behavior: auto; }
  }

  /* ═══════════════════════════════════════════
     Responsive - Tablet
     ═══════════════════════════════════════════ */
  @media (max-width: 768px) {
    .hero {
      min-height: 48vh;
      padding: 72px 20px 60px;
    }

    .random-sentence {
      font-size: 20px;
    }

    .hero-title {
      margin-bottom: 20px;
    }

    .stats-bar {
      gap: 44px;
      margin-top: -22px;
      margin-bottom: 44px;
    }

    .stat-item + .stat-item::before {
      left: -22px;
      height: 32px;
    }

    .stat-num { font-size: 34px; }

    .charts-row {
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .card {
      padding: 26px 22px;
    }

    .container {
      padding: 0 20px 60px;
    }
  }

  /* ═══════════════════════════════════════════
     Responsive - Mobile
     ═══════════════════════════════════════════ */
  @media (max-width: 480px) {
    .hero {
      min-height: 42vh;
      padding: 56px 16px 48px;
    }

    .random-sentence {
      font-size: 18px;
      line-height: 1.85;
    }

    .stats-bar {
      gap: 32px;
      margin-top: -18px;
      margin-bottom: 36px;
    }

    .stat-item + .stat-item::before {
      left: -16px;
      height: 24px;
    }

    .stat-num { font-size: 28px; }
    .stat-label { font-size: 12px; }

    .card {
      padding: 22px 16px;
    }

    .card h2 {
      font-size: 15px;
      margin-bottom: 18px;
    }

    .container {
      padding: 0 14px 48px;
    }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════
     Hero: Random Sentence as focal point
     ═══════════════════════════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <p class="hero-title">诗词统计</p>
    <div id="random-sentence" class="random-sentence loading"></div>
    <p class="hero-note">每次刷新随机展示一句</p>
  </div>
</section>

<div class="container">

  <!-- Stats overview -->
  <div class="stats-bar reveal" id="statsBar"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="card reveal reveal-stagger-1">
      <h2>朝代分布</h2>
      <div class="chart-wrap doughnut">
        <canvas id="dynastyChart"></canvas>
      </div>
    </div>
    <div class="card reveal reveal-stagger-2">
      <h2>诗人句数</h2>
      <div class="chart-wrap bar">
        <canvas id="poetChart"></canvas>
      </div>
    </div>
  </div>

  <footer>
    <a href="/">栖云散录</a>
    <span class="footer-sep">·</span>
    诗词句频统计
    <span class="footer-sep">·</span>
    静态数据
  </footer>

</div>

<!-- ═══════════════════════════════
     Random Sentence Script
     ═══════════════════════════════ -->
<script>
(function() {
  const el = document.getElementById('random-sentence');
  if (!el) return;

  const DEFAULT = '千秋岁月毫端聚 一纸烟霞腕底生';
  let sentences = [];
  const QUEUE = 5;
  let recent = [];

  async function load() {
    try {
      const resp = await fetch('/data/random-sentences.txt');
      if (!resp.ok) throw new Error('fetch failed');
      const text = await resp.text();
      sentences = text.split('\n')
        .map(l => l.trim())
        .filter(l => l && !l.startsWith('#'));
      if (!sentences.length) throw new Error('empty');
    } catch {
      sentences = [DEFAULT];
    }
  }

  function pick() {
    if (!sentences.length) return DEFAULT;
    const pool = sentences.filter(s => !recent.includes(s));
    if (!pool.length) { recent = []; }
    const source = pool.length ? pool : sentences;
    return source[Math.floor(Math.random() * source.length)];
  }

  function show() {
    const line = pick();
    el.innerHTML = line.replace(/  +/g, '<br>');
    el.classList.remove('loading');
  }

  async function init() {
    await load();
    show();
  }

  init();

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) show();
  });
})();
</script>

<!-- ═══════════════════════════════
     Chart.js + Statistics Script
     ═══════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script>
<script>
(async function() {
  const resp = await fetch('data.json');
  const data = await resp.json();

  /* ── Stats bar ── */
  document.getElementById('statsBar').innerHTML = [
    { num: data.totalLines, label: '活跃句子' },
    { num: data.dynasties.filter(d => !['自拟','互联网','其他'].includes(d.dynasty)).length, label: '历史朝代' },
    { num: data.poets.filter(p => !['互联网','自拟'].includes(p.poet)).length, label: '诗人词人' },
  ].map(s =>
    '<div class="stat-item">' +
      '<div class="stat-num">' + s.num + '</div>' +
      '<div class="stat-label">' + s.label + '</div>' +
    '</div>'
  ).join('');

  /* ── Color palette ── */
  const dynastyColors = [
    '#5aa8d8', '#72bce4', '#8bcaf0', '#4e98c0', '#3d80a8', '#2f6a8e',
    '#c49a6c', '#d4ae80', '#b88650', '#a07048',
    '#7eb898', '#64a382', '#8cbc9e',
  ];

  /* ── Dynasty doughnut chart ── */
  new Chart(document.getElementById('dynastyChart'), {
    type: 'doughnut',
    data: {
      labels: data.dynasties.map(d => d.dynasty),
      datasets: [{
        data: data.dynasties.map(d => d.count),
        backgroundColor: dynastyColors,
        borderColor: '#1c1f26',
        borderWidth: 2.5,
        hoverBorderColor: '#1c1f26',
        hoverBorderWidth: 3,
      }]
    },
    options: {
      responsive: true,
      cutout: '58%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#c8ccd4',
            padding: 14,
            font: { size: 11, family: '"Noto Sans SC", sans-serif' },
            usePointStyle: true,
            pointStyleWidth: 8,
            generateLabels: function(chart) {
              var ds = chart.data.datasets[0];
              return chart.data.labels.map(function(label, i) {
                return {
                  text: label + '  ' + ds.data[i],
                  fillStyle: ds.backgroundColor[i],
                  strokeStyle: ds.backgroundColor[i],
                  lineWidth: 0,
                  hidden: false,
                  index: i,
                  fontColor: '#c8ccd4',
                  pointStyle: 'circle',
                  pointStyleWidth: 8,
                };
              });
            }
          }
        },
        tooltip: {
          backgroundColor: 'rgba(28, 31, 38, 0.94)',
          titleColor: '#e8ecf2',
          bodyColor: '#c8ccd4',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) {
              var d = data.dynasties[ctx.dataIndex];
              return ctx.label + ': ' + ctx.raw + ' 句 (' + d.percentage + '%)';
            }
          }
        }
      },
    }
  });

  /* ── Poet horizontal bar chart (top 25) ── */
  var topPoets = data.poets.slice(0, 25);

  new Chart(document.getElementById('poetChart'), {
    type: 'bar',
    data: {
      labels: topPoets.map(function(p) { return p.poet; }),
      datasets: [{
        data: topPoets.map(function(p) { return p.count; }),
        backgroundColor: topPoets.map(function(_, i) {
          var alpha = 0.92 - (i / topPoets.length) * 0.5;
          return 'rgba(90,168,216,' + alpha.toFixed(2) + ')';
        }),
        borderColor: 'transparent',
        borderRadius: 3,
        borderSkipped: false,
        hoverBackgroundColor: 'rgba(90,168,216,0.95)',
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(28, 31, 38, 0.94)',
          titleColor: '#e8ecf2',
          bodyColor: '#c8ccd4',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) { return ctx.raw + ' 句'; }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#7a8090',
            font: { size: 11, family: '"Noto Sans SC", sans-serif' },
            stepSize: 1,
            padding: 6,
          },
        },
        y: {
          grid: { display: false },
          ticks: {
            color: '#c8ccd4',
            font: { size: 12, family: '"Noto Sans SC", sans-serif' },
            autoSkip: false,
            padding: 4,
          },
        }
      },
    }
  });

  /* Set bar chart wrapper height dynamically */
  document.getElementById('poetChart').parentElement.style.height =
    (topPoets.length * 32 + 16) + 'px';

})();
</script>

<!-- ═══════════════════════════════
     Scroll Reveal Observer
     ═══════════════════════════════ -->
<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    threshold: 0.15,
    rootMargin: '0px 0px -30px 0px',
  });

  document.querySelectorAll('.reveal').forEach(function(el) {
    observer.observe(el);
  });
})();
</script>

</body>
</html>
